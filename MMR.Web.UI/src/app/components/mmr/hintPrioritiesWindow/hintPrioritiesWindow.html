<nb-card class="mmrHintPriorities-window">
  <nb-card-header>
    <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
      <div class="dialog-title" style="text-align:center; font-size:1.5em; font-weight:bold;">{{ dialogHeader }}</div>
      <div class="info-icon-container">
        <img class="select-info" />
        <div class="custom-tooltip" [innerHTML]="hintPrioritiesTooltip"></div>
      </div>
    </div>
    <button nbButton class="headerButton" size="xsmall" status="danger" (click)="cancelDialog()" style="position:absolute; right:16px; top:16px;">X</button>
  </nb-card-header>
  <hr style="margin: 0 0 18px 0;" />
  <nb-card-body>
    <div class="tiers-container">
      <div *ngFor="let tier of tiers" class="tier-row">
        <div class="tier-controls">
          <div class="control-wrapper">
            <button nbButton size="tiny" status="primary" (click)="addItemToTier(tier.id)" class="add-btn">+</button>
          </div>
          <div class="control-wrapper">
            <label class="importance-label">
              <input type="checkbox" [(ngModel)]="tier.indicateImportance" class="importance-checkbox">
              <span class="checkbox-text">Importance</span>
            </label>
          </div>
        </div>
        <div class="tier-locations">
          <div class="locations-display" (click)="addItemToTier(tier.id)" style="cursor: pointer;">
            {{ getLocationsDisplay(tier) }}
          </div>
          <div class="item-tags-container">
            <div *ngFor="let item of tier.items" class="item-tag" [title]="getItemLabel(item)">
              <span class="item-label">{{ getItemLabel(item) }}</span>
              <button nbButton size="tiny" status="danger" (click)="removeItemFromTier(tier.id, item)">&times;</button>
            </div>
          </div>
        </div>
        <div class="tier-reorder">
          <div class="control-wrapper">
            <input nbInput type="number" min="0" max="99" [(ngModel)]="tier.hintCount" class="hint-count-input">
          </div>
          <div class="control-wrapper">
            <button nbButton size="tiny" status="basic" (click)="moveTierUp(tier.id)" [disabled]="tier.order === 0" class="up-btn">↑</button>
          </div>
          <div class="control-wrapper">
            <button nbButton size="tiny" status="basic" (click)="moveTierDown(tier.id)" [disabled]="tier.order === tiers.length - 1" class="down-btn">↓</button>
          </div>
          <div class="control-wrapper">
            <button nbButton size="tiny" status="danger" (click)="removeTier(tier.id)" class="remove-btn">&times;</button>
          </div>
        </div>
      </div>
      <div class="add-tier-row">
        <button nbButton size="large" status="primary" (click)="addTier()" class="add-tier-btn">+</button>
      </div>
    </div>
  </nb-card-body>
  <nb-card-footer>
    <div class="footer-buttons" style="display:flex; justify-content:flex-end; gap:18px; margin:18px 0 6px 0;">
      <button nbButton status="danger" (click)="cancelDialog()" style="padding:8px 24px;">Cancel</button>
      <button nbButton status="primary" (click)="confirmDialog()" style="padding:8px 24px;">Save</button>
    </div>
  </nb-card-footer>
</nb-card>
