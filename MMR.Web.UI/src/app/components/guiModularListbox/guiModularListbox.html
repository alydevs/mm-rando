<div class="dual-list-wrapper" [ngStyle]="{'height': height}">

  <!-- Hex string input - only show if enabled -->
  <form *ngIf="valueIsHexString && enableHexString">
    <input name="hexString" nbInput class="hexTextInput" type="text" [maxlength]="500" fieldSize="small" [readonly]="disabled"
           (focus)="hexInputFocusIn()" (focusout)="hexInputFocusOut()" [(ngModel)]="currentHexString">
  </form>

  <div class="dual-list" [ngClass]="{
    'dual-list-withTagFilterOneNoPreset': tagFilter && !presets && !coDependentFilters && !enableCoDependentFilters,
    'dual-list-withTagFilterMultiPreset': tagFilter && presets && coDependentFilters && enableCoDependentFilters,
    'dual-list-withHexString': valueIsHexString && enableHexString
  }">

    <div class="listbox" [ngStyle]="{ 'order' :  direction() ? 1 : 2, 'margin-left' : direction() ? 0 : '10px' }">

      <!-- Preset selector - only show if enabled -->
      <ng-container *ngIf="presets && enablePresets">
        <span class="comboBoxLabel">{{presets.text}}</span>
        <div class="select-wrapper">
          <nb-select multiple placeholder="None" class="selectXSmall"
                     [disabled]="disabled"
                     (selectedChange)="selectedPresetListChange($event)"
                     [(selected)]="selectedPresets">
            <nb-select-label>{{getNbMultipleSelectLabel(presets)}}</nb-select-label>
            <nb-option *ngFor="let option of presets.presets; index as optionIndex" [value]="option">{{option}}</nb-option>
          </nb-select>
        </div>
      </ng-container>

      <div class="buttonBox">
        <button nbButton type="button" name="addBtn" class="btn btn-primary btn-block switchButton" (click)="moveItem(available, confirmed)" [ngClass]="direction() ? 'point-right' : 'point-left'" [disabled]="available.pick.length === 0">
          {{format.add}}
        </button> <button nbButton type="button" class="btn btn-primary pull-left" (click)="selectAll(available)" [disabled]="disabled || isAllSelected(available)">
          {{format.all}}
        </button>
        <button nbButton type="button" class="btn btn-default pull-right" (click)="selectNone(available)" [disabled]="!isAnySelected(available)">
          {{format.none}}
        </button>
      </div>

      <form *ngIf="filter" class="filter">
        <!-- Simple tag filter (original guiListbox behavior) -->
        <ng-container *ngIf="!enableCoDependentFilters">
          <nb-select *ngIf="tagFilter" class="tagFilterSelect" [(selected)]="selectedTag" (selectedChange)="onFilterChange()" size="xsmall">
            <nb-option *ngFor="let tag of tagFilter; index as tagIndex" [value]="tag">{{tag}}</nb-option>
          </nb-select>
        </ng-container>

        <!-- Complex tag filter (MMR behavior) -->
        <ng-container *ngIf="enableCoDependentFilters">
          <ng-template ngFor let-filter [ngForOf]="tagFilter" let-itemIndex="index">
            <div class="form-filter-box">
              <span *ngIf="filter.tags" class="comboBoxLabel">{{filter.text}}</span>
              <nb-select *ngIf="filter.tags" class="tagFilterSelect" [(selected)]="selectedTag[filter.name]" (selectedChange)="onFilterChange()" size="xsmall" [disabled]="disabled">
                <nb-option *ngFor="let tag of filter.tags; index as tagIndex" [value]="tag">{{tag}}</nb-option>
              </nb-select>
            </div>
          </ng-template>
        </ng-container>

        <input nbInput [disabled]="disabled || available.list.length === 0" class="form-control" name="filterSource" [readonly]="disabled" [(ngModel)]="available.picker" (ngModelChange)="onFilter(available)">
      </form>

      <div class="record-picker" [ngClass]="{
        'pickerWithTagFilter': tagFilter && !enableCoDependentFilters,
        'pickerWithTagFilterOneNoPreset': tagFilter && !presets && !coDependentFilters && enableCoDependentFilters,
        'pickerWithTagFilterMultiNoPreset': tagFilter && !presets && coDependentFilters && enableCoDependentFilters,
        'pickerWithTagFilterMultiPreset': tagFilter && presets && coDependentFilters && enableCoDependentFilters
      }">
        <ul [ngClass]="{over:available.dragOver}" (drop)="drop($event, confirmed)" (dragover)="allowDrop($event, available)" (dragleave)="dragLeave()">
          <li *ngFor="let item of available.sift; let idx=index;" (click)="disabled ? null : selectItem(available.pick, item); shiftClick($event, idx, available, item)" [ngClass]="{selected: isItemSelected(available.pick, item), disabled: disabled}" [draggable]="!disabled && format.draggable"
              (dragstart)="drag($event, item, available)" (dragend)="dragEnd(available)"
              (mouseenter)="item._tooltip ? onTooltipMouseEnter(popover) : null"
              (mouseleave)="item._tooltip ? onTooltipMouseLeave(popover) : null"
              [nbPopover]="item._tooltip ? tooltipComponent : null" [nbPopoverContext]="item._tooltip ? {tooltip: item._tooltip} : null" [nbPopoverTrigger]="'noop'" [nbPopoverPlacement]="item._tooltip ? getTooltipPlacement('available') : null" #popover="nbPopover"><label>{{item._name}}</label></li>
        </ul>
      </div>
    </div>

    <div class="listbox" [ngStyle]="{ 'order' : direction() ? 2 : 1, 'margin-left' : direction() ? '10px' : 0 }">
      <div class="buttonBox" [ngClass]="{
        'hexPad': valueIsHexString && !presets && enableHexString,
        'presetPad': !valueIsHexString && presets && enablePresets,
        'hexPresetsPad': valueIsHexString && presets && enableHexString && enablePresets
      }">
        <button nbButton type="button" name="removeBtn" class="btn btn-primary btn-block switchButton" (click)="moveItem(confirmed, available)" [ngClass]="direction() ? 'point-left' : 'point-right'" [disabled]="confirmed.pick.length === 0">
          {{format.remove}}
        </button>
        <button nbButton type="button" class="btn btn-primary pull-left" (click)="selectAll(confirmed)" [disabled]="disabled || isAllSelected(confirmed)">
          {{format.all}}
        </button>
        <button nbButton type="button" class="btn btn-default pull-right" (click)="selectNone(confirmed)" [disabled]="!isAnySelected(confirmed)">
          {{format.none}}
        </button>
      </div>
      <form *ngIf="filter" class="filter">
        <div *ngIf="tagFilter" [ngClass]="{
          'tagFilterSelectPadding': tagFilter && !enableCoDependentFilters,
          'tagFilterSingleSelectPadding': tagFilter && !coDependentFilters && enableCoDependentFilters,
          'tagFilterMultiSelectPadding': tagFilter && coDependentFilters && enableCoDependentFilters
        }"></div>
        <input nbInput [disabled]="disabled || confirmed.list.length === 0" class="form-control" name="filterDestination" [readonly]="disabled" [(ngModel)]="confirmed.picker" (ngModelChange)="onFilter(confirmed)">
      </form>

      <div class="record-picker" [ngClass]="{
        'pickerWithTagFilter': tagFilter && !enableCoDependentFilters,
        'pickerWithTagFilterOneNoPreset': tagFilter && !presets && !coDependentFilters && enableCoDependentFilters,
        'pickerWithTagFilterMultiNoPreset': tagFilter && !presets && coDependentFilters && enableCoDependentFilters,
        'pickerWithTagFilterMultiPreset': tagFilter && presets && coDependentFilters && enableCoDependentFilters
      }">
        <ul [ngClass]="{over:confirmed.dragOver}" (drop)="drop($event, available)" (dragover)="allowDrop($event, confirmed)" (dragleave)="dragLeave()">
          <li #itmConf *ngFor="let item of confirmed.sift; let idx=index;" (click)="disabled ? null : selectItem(confirmed.pick, item); shiftClick($event, idx, confirmed, item)" [ngClass]="{selected: isItemSelected(confirmed.pick, item), disabled: disabled}" [draggable]="!disabled && format.draggable"
              (dragstart)="drag($event, item, confirmed)" (dragend)="dragEnd(confirmed)"
              (mouseenter)="item._tooltip ? onTooltipMouseEnter(popoverConf) : null"
              (mouseleave)="item._tooltip ? onTooltipMouseLeave(popoverConf) : null"
              [nbPopover]="item._tooltip ? tooltipComponent : null" [nbPopoverContext]="item._tooltip ? {tooltip: item._tooltip} : null" [nbPopoverTrigger]="'noop'" [nbPopoverPlacement]="item._tooltip ? getTooltipPlacement('confirmed') : null" #popoverConf="nbPopover"><label>{{item._name}}</label></li>
        </ul>
      </div>
    </div>
  </div>
</div>
